<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新闻热词 — 时间轴词云</title>
<script src="https://cdn.jsdelivr.net/npm/wordcloud@1.2.2/src/wordcloud2.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Ma+Shan+Zheng&family=Source+Code+Pro:wght@400;600&display=swap');

  :root {
    --ink: #0e0e0c;
    --paper: #f0ebe2;
    --rust: #a0522d;
    --vermillion: #c23616;
    --gold: #b8860b;
    --muted: #6b6358;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif SC', serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  header {
    text-align: center;
    padding: 1rem 1rem 0.4rem;
    flex-shrink: 0;
  }
  header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(1.8rem, 4.5vw, 3rem);
    letter-spacing: 0.12em;
    text-shadow: 2px 2px 0 rgba(160,82,45,0.25);
  }
  header .sub {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-top: 0.15rem;
  }

  .month-display {
    text-align: center;
    padding: 0.2rem 0;
    flex-shrink: 0;
  }
  .month-display .month {
    font-family: 'Source Code Pro', monospace;
    font-size: 2rem;
    font-weight: 600;
    color: var(--gold);
    transition: opacity 0.15s;
  }
  .month-display .count {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.1rem;
  }

  /* Cloud canvas container */
  #cloud-wrap {
    flex: 1;
    position: relative;
    margin: 0 2vw;
    min-height: 0;
  }
  #cloud-wrap::before {
    content: '';
    position: absolute;
    width: 80%;
    height: 80%;
    top: 10%;
    left: 10%;
    background: radial-gradient(ellipse, rgba(160,82,45,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  #cloud-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Tooltip */
  #tip {
    position: fixed;
    background: rgba(14,14,12,0.92);
    border: 1px solid var(--rust);
    color: var(--paper);
    padding: 0.3rem 0.6rem;
    font-family: 'Source Code Pro', monospace;
    font-size: 0.72rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.12s;
    z-index: 1000;
    white-space: nowrap;
  }

  /* Timeline */
  .timeline {
    flex-shrink: 0;
    padding: 0.6rem 3vw 1rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .btn {
    width: 34px;
    height: 34px;
    border: 1.5px solid var(--rust);
    background: transparent;
    color: var(--paper);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .btn:hover, .btn.on {
    background: var(--vermillion);
    border-color: var(--vermillion);
  }
  .btn.on { animation: glow 1.6s ease infinite; }
  @keyframes glow {
    0%,100% { box-shadow: 0 0 0 0 rgba(194,54,22,0.35); }
    50% { box-shadow: 0 0 0 7px rgba(194,54,22,0); }
  }

  .speed {
    font-family: 'Source Code Pro', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    background: transparent;
    border: 1px solid rgba(244,239,230,0.12);
    padding: 0.2rem 0.45rem;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .speed:hover { border-color: var(--rust); color: var(--paper); }

  .track {
    flex: 1;
    position: relative;
    height: 34px;
    display: flex;
    align-items: center;
  }
  .rail {
    width: 100%;
    height: 2px;
    background: rgba(244,239,230,0.1);
    position: absolute;
  }
  .rail-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rust), var(--vermillion));
    transition: width 0.35s ease;
    width: 0;
  }
  .dots {
    position: absolute;
    width: 100%;
    display: flex;
    justify-content: space-between;
  }
  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--ink);
    border: 2px solid rgba(244,239,230,0.2);
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
  }
  .dot:hover, .dot.on {
    border-color: var(--vermillion);
    background: var(--vermillion);
    transform: scale(1.4);
    box-shadow: 0 0 10px rgba(194,54,22,0.5);
  }
  .dot-label {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Source Code Pro', monospace;
    font-size: 0.55rem;
    color: var(--muted);
    white-space: nowrap;
    pointer-events: none;
    transition: color 0.3s;
  }
  .dot.on .dot-label { color: var(--paper); }
</style>
</head>
<body>

<header>
  <h1>新闻热词</h1>
  <div class="sub">CUMULATIVE WORD FREQUENCY · TIMELINE</div>
</header>

<div class="month-display">
  <div class="month" id="cur-month">2024-12</div>
  <div class="count" id="cur-count"></div>
</div>

<div id="cloud-wrap">
  <canvas id="cloud-canvas"></canvas>
</div>
<div id="tip"></div>

<div class="timeline">
  <button class="btn" id="play" title="Space">&#9654;</button>
  <button class="speed" id="speed">2s</button>
  <div class="track">
    <div class="rail"><div class="rail-fill" id="rail-fill"></div></div>
    <div class="dots" id="dots"></div>
  </div>
</div>

const PALETTES = [
  '#c23616','#e74c3c','#e8a87c','#d4a017','#b8860b',
  '#f0ebe2','#d5cfc3','#c9b99a','#3a8a7e','#2e6b62',
  '#a0522d','#c4713a','#8b7355','#d4a574'
];

let idx = 0, playing = false, timer = null;
const speeds = [3000, 2000, 1200, 800];
const speedLabels = ['3s','2s','1.2s','0.8s'];
let speedIdx = 1;
let colorMap = {};
let cc = 0;

function color(w) {
  if (!colorMap[w]) { colorMap[w] = PALETTES[cc++ % PALETTES.length]; }
  return colorMap[w];
}

function sizeCanvas() {
  const wrap = document.getElementById('cloud-wrap');
  const canvas = document.getElementById('cloud-canvas');
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

function init() {
  sizeCanvas();
  const dotsEl = document.getElementById('dots');
  D.months.forEach((m, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' on' : '');
    d.innerHTML = `<span class="dot-label">${m.slice(2)}</span>`;
    d.onclick = () => { idx = i; renderFrame(); };
    dotsEl.appendChild(d);
  });
  renderFrame();
}

function renderFrame() {
  const snap = D.snapshots[idx];
  const maxFreq = snap.words[0]?.[1] || 1;

  document.getElementById('cur-month').textContent = snap.month;
  const totalFreq = snap.words.reduce((s, w) => s + w[1], 0);
  document.getElementById('cur-count').textContent =
    `累积 ${totalFreq.toLocaleString()} 词次 · ${snap.words.length} 独立词`;

  const pct = D.months.length > 1 ? (idx / (D.months.length - 1)) * 100 : 100;
  document.getElementById('rail-fill').style.width = pct + '%';
  document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i <= idx));

  // Prepare wordcloud2 list: [word, size]
  // Scale relative to canvas size
  const canvas = document.getElementById('cloud-canvas');
  const area = canvas.width * canvas.height;
  const scaleFactor = Math.sqrt(area) / 18;

  const list = snap.words.map(([word, freq]) => {
    const ratio = freq / maxFreq;
    const size = Math.max(8, ratio * scaleFactor);
    return [word, size];
  });

  // Clear and redraw
  WordCloud(canvas, {
    list: list,
    gridSize: Math.round(Math.sqrt(area) / 80),
    weightFactor: 1,
    fontFamily: '"Ma Shan Zheng", "Noto Serif SC", cursive, serif',
    color: function(word) { return color(word); },
    backgroundColor: 'transparent',
    rotateRatio: 0.15,
    rotationSteps: 3,
    shuffle: false,
    drawOutOfBound: false,
    shrinkToFit: true,
    wait: 0,
    hover: function(item, dimension, event) {
      const tip = document.getElementById('tip');
      if (item) {
        tip.textContent = `${item[0]}：${snap.words.find(w => w[0] === item[0])?.[1] || '?'} 次`;
        tip.style.opacity = '1';
        tip.style.left = (event.clientX + 12) + 'px';
        tip.style.top = (event.clientY - 30) + 'px';
      } else {
        tip.style.opacity = '0';
      }
    }
  });
}

// Play/Pause
document.getElementById('play').onclick = function() {
  playing = !playing;
  this.classList.toggle('on', playing);
  this.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) tick();
  else clearTimeout(timer);
};

function tick() {
  if (!playing) return;
  idx = (idx + 1) % D.months.length;
  renderFrame();
  timer = setTimeout(tick, speeds[speedIdx]);
}

document.getElementById('speed').onclick = function() {
  speedIdx = (speedIdx + 1) % speeds.length;
  this.textContent = speedLabels[speedIdx];
};

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'k') {
    e.preventDefault();
    document.getElementById('play').click();
  } else if (e.key === 'ArrowRight') {
    idx = Math.min(idx + 1, D.months.length - 1);
    renderFrame();
  } else if (e.key === 'ArrowLeft') {
    idx = Math.max(idx - 1, 0);
    renderFrame();
  }
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { sizeCanvas(); renderFrame(); }, 200);
});

init();
</script>
